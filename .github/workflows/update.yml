name: Daily AI progress update

on:
  schedule:
    # UTC 12:00 = 多伦多 8:00 / 北京 20:00
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet "anthropic>=0.40.0"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch latest content via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-5
        run: python scripts/fetch_content.py

      - name: Commit and push changes
        run: |
          DATE=$(TZ="America/Toronto" date +"%Y-%m-%d")
          if [[ -n "$(git status --porcelain)" ]]; then
            git add index.html
            git commit -m "chore: daily auto-update ${DATE}"
            git push
          else
            echo "No changes to commit"
          fi
